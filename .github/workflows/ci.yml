name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,docs]"
      - run: ruff check .
      - run: mypy hallucheck
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # [docs] so the DOCX/PDF renderers are exercised (and counted in coverage)
      - run: pip install -e ".[dev,docs]"
      - run: pytest --cov=hallucheck --cov-report=term-missing --cov-fail-under=78
